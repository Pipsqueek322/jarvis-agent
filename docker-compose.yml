services:
  jarvis:
    image: python:3.12-slim
    container_name: jarvis
    working_dir: /app
    volumes:
      - .:/app
    command: bash -c "pip install --quiet rich requests && echo '✅ JARVIS initialized. Run python jarvis.py for interactive mode.' && bash"
    ports:
      - "8080:8080"
    tty: true
    stdin_open: true