services:
  jarvis:
    image: python:3.12-slim
    container_name: jarvis
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8080:8080"
      - "8501:8501"
    command: bash -c "apt-get update -qq && apt-get install -y --no-install-recommends git && pip install --quiet rich requests streamlit && echo '✅ JARVIS Container Ready' && tail -f /dev/null"
    tty: true
    stdin_open: true
