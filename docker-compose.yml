services:
  jarvis:
    image: python:3.12-slim
    container_name: jarvis
    working_dir: /app
    volumes:
      - .:/app
    command: >
      bash -c "apt-get update -qq && apt-get install -y --no-install-recommends git && pip install --quiet rich requests && echo '✅ JARVIS Agent v1.0 Ready' && echo 'Knowledge base is mounted. Run: ls knowledge-base' && bash" 
    ports:
      - "8080:8080"
    tty: true
    stdin_open: true